<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的主页 — 狼人杀记录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: #0d0a1a;
      color: #e8e0ff;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: rgba(26,18,40,0.95);
      border-bottom: 1px solid #2a1848;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .logo { font-size: 15px; font-weight: 900; color: #c090ff; display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 32px; height: 32px; background: linear-gradient(135deg, #7040c0, #4020a0); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: #fff; }
    .username { font-size: 13px; font-weight: 700; color: #d0b8ff; }
    .btn-out { font-size: 12px; color: #5a4080; cursor: pointer; padding: 4px 8px; border-radius: 6px; border: 1px solid #2a1848; background: none; }
    .btn-out:hover { color: #c090ff; border-color: #5a3090; }

    /* ── Main ── */
    main { max-width: 960px; margin: 0 auto; padding: 32px 20px 60px; }

    /* ── Welcome ── */
    .welcome { margin-bottom: 32px; }
    .welcome h1 { font-size: 24px; font-weight: 900; color: #e8e0ff; margin-bottom: 6px; }
    .welcome p { font-size: 14px; color: #5a4080; }

    /* ── Stats ── */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 32px; }
    .stat-card {
      background: #1a1228;
      border: 1px solid #2a1848;
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-icon { font-size: 22px; margin-bottom: 4px; }
    .stat-value { font-size: 28px; font-weight: 900; color: #c090ff; }
    .stat-label { font-size: 12px; color: #5a4080; }

    /* ── Quick actions ── */
    .section-title { font-size: 13px; font-weight: 800; color: #7050a0; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 14px; }
    .actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 32px; }
    .action-card {
      background: #1a1228;
      border: 1px solid #2a1848;
      border-radius: 14px;
      padding: 22px 20px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
      text-decoration: none;
      display: block;
    }
    .action-card:hover { border-color: #7040c0; transform: translateY(-2px); }
    .action-card.primary { background: linear-gradient(135deg, #2a0860, #1a0440); border-color: #5030a0; }
    .action-icon { font-size: 28px; margin-bottom: 10px; }
    .action-title { font-size: 15px; font-weight: 800; color: #d0b8ff; margin-bottom: 4px; }
    .action-desc { font-size: 12px; color: #5a4080; line-height: 1.5; }

    /* ── History ── */
    .history-section { margin-bottom: 32px; }
    .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      background: #1a1228;
      border: 1px solid #2a1848;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .history-item:hover { border-color: #5030a0; }
    .history-icon { font-size: 22px; flex-shrink: 0; }
    .history-info { flex: 1; min-width: 0; }
    .history-title { font-size: 14px; font-weight: 700; color: #d0b8ff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-meta { font-size: 11px; color: #5a4080; margin-top: 3px; }
    .history-arrow { color: #3a2060; font-size: 16px; flex-shrink: 0; }
    .history-del { font-size: 12px; color: #5a3060; cursor: pointer; padding: 4px 8px; border-radius: 6px; flex-shrink: 0; }
    .history-del:hover { background: #2a1020; color: #c03030; }
    .empty-state { text-align: center; padding: 40px 20px; color: #3a2060; }
    .empty-state p { font-size: 13px; margin-top: 8px; }

    /* ── Profile modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .modal-box { background: #1a1228; border: 1px solid #2a1848; border-radius: 14px; padding: 24px; width: 340px; max-width: 90vw; display: flex; flex-direction: column; gap: 12px; }
    .modal-title { font-size: 15px; font-weight: 800; color: #e0d0ff; }
    .modal-input { width: 100%; padding: 9px 12px; border: 1.5px solid #2a1848; border-radius: 8px; font-size: 13px; background: #0d0a1a; color: #e8e0ff; }
    .modal-input:focus { outline: none; border-color: #7040c0; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn { padding: 7px 14px; border-radius: 8px; border: 1px solid #2a1848; background: #1a1228; color: #d0b8ff; cursor: pointer; font-size: 13px; font-weight: 600; }
    .btn-primary { background: linear-gradient(135deg, #7040c0, #4020a0); color: #fff; border-color: #7040c0; }
    .btn-danger { background: #2a1020; border-color: #601020; color: #ff8080; }
    .msg { font-size: 12px; padding: 6px 10px; border-radius: 6px; }
    .msg.ok { background: #0a2a14; color: #40c060; }
    .msg.err { background: #2a0a0a; color: #ff6060; }

    /* ── Stats detail ── */
    .stats-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 32px; }
    .stat-detail-card { background: #1a1228; border: 1px solid #2a1848; border-radius: 12px; padding: 18px 20px; }
    .stat-detail-title { font-size: 12px; font-weight: 800; color: #7050a0; margin-bottom: 14px; letter-spacing: 0.5px; text-transform: uppercase; }
    .win-bar-wrap { display: flex; flex-direction: column; gap: 8px; }
    .win-bar-row { display: flex; align-items: center; gap: 8px; }
    .win-bar-label { font-size: 12px; color: #a080d0; width: 52px; flex-shrink: 0; }
    .win-bar-track { flex: 1; background: #0d0a1a; border-radius: 6px; height: 10px; overflow: hidden; }
    .win-bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s; }
    .win-bar-count { font-size: 12px; color: #5a4080; width: 24px; text-align: right; flex-shrink: 0; }
    .board-list { display: flex; flex-direction: column; gap: 6px; }
    .board-row { display: flex; align-items: center; gap: 8px; }
    .board-name { font-size: 12px; color: #a080d0; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .board-bar-track { width: 80px; background: #0d0a1a; border-radius: 4px; height: 6px; overflow: hidden; flex-shrink: 0; }
    .board-bar-fill { height: 100%; background: #5030a0; border-radius: 4px; transition: width 0.4s; }
    .board-count { font-size: 11px; color: #5a4080; width: 20px; text-align: right; flex-shrink: 0; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      main { padding: 20px 14px 40px; }
      .stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stats-detail { grid-template-columns: 1fr; }
      .stat-card { padding: 12px; }
      .stat-value { font-size: 22px; }
      .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🐺 狼人杀记录</div>
  <div class="header-right">
    <div class="avatar" id="avatarEl"></div>
    <div class="username" id="usernameEl"></div>
    <button class="btn-out" onclick="logout()">退出</button>
  </div>
</header>

<main>
  <div class="welcome">
    <h1 id="welcomeText">欢迎回来</h1>
    <p id="welcomeSub">准备好开始新的一局了吗？</p>
  </div>

  <!-- 统计 -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-icon">🎮</div>
      <div class="stat-value" id="totalGames">—</div>
      <div class="stat-label">总对局数</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📅</div>
      <div class="stat-value" id="thisMonth">—</div>
      <div class="stat-label">本月对局</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🏆</div>
      <div class="stat-value" id="lastActive">—</div>
      <div class="stat-label">最近活跃</div>
    </div>
  </div>

  <!-- 快捷操作 -->
  <div class="section-title">快捷操作</div>
  <div class="actions">
    <a href="werewolf.html?new=1" class="action-card primary">
      <div class="action-icon">🎯</div>
      <div class="action-title">开始新对局</div>
      <div class="action-desc">进入记录页面，开始新一局狼人杀</div>
    </a>
    <div class="action-card" onclick="openProfileModal()">
      <div class="action-icon">👤</div>
      <div class="action-title">个人设置</div>
      <div class="action-desc">修改密码，管理账户信息</div>
    </div>
  </div>

  <!-- 详细统计 -->
  <div class="stats-detail" id="statsDetail" style="display:none">
    <div class="stat-detail-card">
      <div class="stat-detail-title">胜负统计</div>
      <div class="win-bar-wrap" id="winBars"></div>
    </div>
    <div class="stat-detail-card">
      <div class="stat-detail-title">常用板子</div>
      <div class="board-list" id="boardList"></div>
    </div>
  </div>

  <!-- 历史记录 -->
  <div class="history-section">
    <div class="history-header">
      <div class="section-title" style="margin:0">历史对局</div>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-state">⏳ <p>加载中…</p></div>
    </div>
  </div>
</main>

<!-- 个人设置 Modal -->
<div id="profileModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeProfileModal()">
  <div class="modal-box">
    <div class="modal-title">个人设置</div>
    <div style="font-size:12px;color:#7050a0;">修改密码</div>
    <input class="modal-input" type="password" id="oldPwd" placeholder="当前密码">
    <input class="modal-input" type="password" id="newPwd" placeholder="新密码">
    <input class="modal-input" type="password" id="newPwd2" placeholder="确认新密码">
    <div id="profileMsg" style="display:none"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeProfileModal()">取消</button>
      <button class="btn btn-primary" onclick="changePassword()">保存</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:3001';
const token = localStorage.getItem('ww_token');
const username = localStorage.getItem('ww_user');

// 未登录跳转
if (!token) {
  window.location.href = 'index.html';
}

// 显示用户信息
document.getElementById('avatarEl').textContent = (username || '?')[0].toUpperCase();
document.getElementById('usernameEl').textContent = username;
document.getElementById('welcomeText').textContent = '欢迎回来，' + username + ' 👋';

function logout() {
  localStorage.removeItem('ww_token');
  localStorage.removeItem('ww_user');
  window.location.href = 'index.html';
}

// ── 加载历史记录 ──────────────────────────────────────────────────────────
async function loadHistory() {
  try {
    const res = await fetch(`${API}/api/games`, { headers: { 'Authorization': 'Bearer ' + token } });
    const games = await res.json();

    // 统计
    renderDetailStats(games);
    document.getElementById('totalGames').textContent = games.length;
    const now = new Date();
    const thisMonth = games.filter(g => {
      const d = new Date(g.created_at);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }).length;
    document.getElementById('thisMonth').textContent = thisMonth;
    if (games.length > 0) {
      const last = new Date(games[0].created_at);
      const diff = Math.floor((now - last) / 86400000);
      document.getElementById('lastActive').textContent = diff === 0 ? '今天' : diff + '天前';
    } else {
      document.getElementById('lastActive').textContent = '—';
    }

    // 列表
    const list = document.getElementById('historyList');
    if (!games.length) {
      list.innerHTML = '<div class="empty-state">🎮 <p>还没有对局记录，去开始第一局吧！</p></div>';
      return;
    }
    list.innerHTML = games.map(g => `
      <div class="history-item" onclick="loadGame(${g.id})">
        <div class="history-icon">🃏</div>
        <div class="history-info">
          <div class="history-title">${escHtml(g.title)}</div>
          <div class="history-meta">${g.board_type || '未知板子'} · ${new Date(g.created_at).toLocaleString('zh-CN')}${g.game_result ? ' · ' + {'good':'好人胜','wolf':'狼人胜','draw':'平局'}[g.game_result] : ''}</div>
        </div>
        <div class="history-arrow">›</div>
        <div class="history-del" onclick="event.stopPropagation();printGame(${g.id})" style="color:#4070c0" title="保存PDF">PDF</div>
        <div class="history-del" onclick="event.stopPropagation();delGame(${g.id},this)">删除</div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('historyList').innerHTML = '<div class="empty-state">❌ <p>无法连接到服务器</p></div>';
  }
}

function renderDetailStats(games) {
  if (!games.length) return;
  document.getElementById('statsDetail').style.display = '';

  // 胜负
  const good = games.filter(g => g.game_result === 'good').length;
  const wolf = games.filter(g => g.game_result === 'wolf').length;
  const draw = games.filter(g => g.game_result === 'draw').length;
  const withResult = good + wolf + draw;
  const maxW = Math.max(good, wolf, draw, 1);
  document.getElementById('winBars').innerHTML = [
    { label: '好人胜', count: good, color: '#40a040' },
    { label: '狼人胜', count: wolf, color: '#c03030' },
    { label: '平局',   count: draw, color: '#606080' },
  ].map(r => `
    <div class="win-bar-row">
      <div class="win-bar-label">${r.label}</div>
      <div class="win-bar-track"><div class="win-bar-fill" style="width:${r.count/maxW*100}%;background:${r.color}"></div></div>
      <div class="win-bar-count">${r.count}</div>
    </div>`).join('') +
    (withResult ? `<div style="font-size:11px;color:#5a4080;margin-top:6px">共 ${withResult} 局有结果记录</div>` : '');

  // 板子使用
  const boardCount = {};
  games.forEach(g => { if (g.board_type) boardCount[g.board_type] = (boardCount[g.board_type] || 0) + 1; });
  const sorted = Object.entries(boardCount).sort((a,b) => b[1]-a[1]).slice(0, 6);
  const maxB = sorted[0]?.[1] || 1;
  document.getElementById('boardList').innerHTML = sorted.length
    ? sorted.map(([name, cnt]) => `
        <div class="board-row">
          <div class="board-name">${name}</div>
          <div class="board-bar-track"><div class="board-bar-fill" style="width:${cnt/maxB*100}%"></div></div>
          <div class="board-count">${cnt}</div>
        </div>`).join('')
    : '<div style="font-size:12px;color:#5a4080">暂无数据</div>';
}

function escHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function loadGame(id) {
  try {
    const res = await fetch(`${API}/api/games/${id}`, { headers: { 'Authorization': 'Bearer ' + token } });
    const game = await res.json();
    localStorage.setItem('ww_load_game', JSON.stringify(game.data));
    window.location.href = 'werewolf.html';
  } catch { alert('载入失败'); }
}

async function printGame(id) {
  try {
    const res = await fetch(`${API}/api/games/${id}`, { headers: { 'Authorization': 'Bearer ' + token } });
    const game = await res.json();
    localStorage.setItem('ww_load_game', JSON.stringify(game.data));
    localStorage.setItem('ww_print_on_load', '1');
    window.location.href = 'werewolf.html';
  } catch { alert('载入失败'); }
}

async function delGame(id, el) {
  if (!confirm('删除这条记录？')) return;
  await fetch(`${API}/api/games/${id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
  el.closest('.history-item').remove();
  loadHistory();
}

// ── 修改密码 ──────────────────────────────────────────────────────────────
function openProfileModal() { document.getElementById('profileModal').style.display = 'flex'; }
function closeProfileModal() { document.getElementById('profileModal').style.display = 'none'; }

async function changePassword() {
  const oldPwd = document.getElementById('oldPwd').value;
  const newPwd = document.getElementById('newPwd').value;
  const newPwd2 = document.getElementById('newPwd2').value;
  const msg = document.getElementById('profileMsg');
  if (newPwd !== newPwd2) { showMsg('两次输入的新密码不一致', 'err'); return; }
  if (newPwd.length < 6) { showMsg('新密码至少6位', 'err'); return; }
  try {
    const res = await fetch(`${API}/api/change-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ oldPassword: oldPwd, newPassword: newPwd })
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.error, 'err'); return; }
    showMsg('密码修改成功', 'ok');
    setTimeout(closeProfileModal, 1500);
  } catch { showMsg('连接失败', 'err'); }
}

function showMsg(text, type) {
  const el = document.getElementById('profileMsg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

loadHistory();
</script>
</body>
</html>
