<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>狼人杀对局记录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: #0d0a1a;
      color: #e8e0ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 20%, #2a0860 0%, #0d0a1a 65%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      background: rgba(26, 18, 40, 0.9);
      border: 1px solid #2a1848;
      border-radius: 20px;
      padding: 40px 36px;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon { font-size: 40px; margin-bottom: 10px; }
    .logo h1 {
      font-size: 20px;
      font-weight: 900;
      background: linear-gradient(135deg, #ffffff 0%, #c090ff 60%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo p { font-size: 12px; color: #5a4080; margin-top: 4px; }

    .tabs {
      display: flex;
      background: #0d0a1a;
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 8px;
      color: #5a4080;
      transition: all 0.2s;
    }
    .tab.active { background: #2a1848; color: #c090ff; }

    .form { display: flex; flex-direction: column; gap: 12px; }
    .input-wrap { display: flex; flex-direction: column; gap: 5px; }
    .input-label { font-size: 11px; font-weight: 700; color: #7050a0; }
    input {
      width: 100%;
      padding: 11px 14px;
      background: #0d0a1a;
      border: 1.5px solid #2a1848;
      border-radius: 10px;
      font-size: 14px;
      color: #e8e0ff;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    input:focus { outline: none; border-color: #7040c0; }
    input::placeholder { color: #3a2860; }

    .error {
      font-size: 12px;
      color: #ff7070;
      background: rgba(192,48,48,0.1);
      border: 1px solid rgba(192,48,48,0.2);
      padding: 8px 12px;
      border-radius: 8px;
      display: none;
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #7040c0, #4020a0);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.15s, transform 0.15s;
      font-family: inherit;
    }
    .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

    .footer-note { text-align: center; margin-top: 24px; font-size: 11px; color: #3a2860; }
  </style>
</head>
<body>
<div class="bg-glow"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🐺</div>
    <h1>狼人杀对局记录</h1>
    <p>记录发言 · 标记身份 · 复盘分析</p>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">登录</div>
    <div class="tab" id="tab-register" onclick="switchTab('register')">注册</div>
  </div>

  <div class="form">
    <div class="input-wrap">
      <div class="input-label">用户名</div>
      <input type="text" id="username" placeholder="输入用户名" autocomplete="username" onkeydown="if(event.key==='Enter')submit()">
    </div>
    <div class="input-wrap">
      <div class="input-label">密码</div>
      <input type="password" id="password" placeholder="输入密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')submit()">
    </div>
    <div class="error" id="errMsg"></div>
    <button class="submit-btn" id="submitBtn" onclick="submit()">登录</button>
  </div>

  <div class="footer-note">数据仅存储在本服务器，不会分享给第三方</div>
</div>

<script>
const API = 'http://localhost:3001';
let currentTab = 'login';

if (localStorage.getItem('ww_token')) {
  window.location.href = 'app/dashboard.html';
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('submitBtn').textContent = tab === 'login' ? '登录' : '注册';
  document.getElementById('errMsg').style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

async function submit() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) { showError('请填写用户名和密码'); return; }
  if (currentTab === 'register' && password.length < 6) { showError('密码至少 6 位'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '请稍候…';
  document.getElementById('errMsg').style.display = 'none';

  try {
    const res = await fetch(`${API}/api/${currentTab}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || '请求失败'); return; }

    if (currentTab === 'register') {
      const loginRes = await fetch(`${API}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const loginData = await loginRes.json();
      localStorage.setItem('ww_token', loginData.token);
      localStorage.setItem('ww_user', loginData.username);
    } else {
      localStorage.setItem('ww_token', data.token);
      localStorage.setItem('ww_user', data.username);
    }
    window.location.href = 'app/dashboard.html';
  } catch {
    showError('无法连接到服务器');
  } finally {
    btn.disabled = false;
    btn.textContent = currentTab === 'login' ? '登录' : '注册';
  }
}
</script>
</body>
</html>
