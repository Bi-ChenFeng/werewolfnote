<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的主页 — 狼人杀记录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: #0d0a1a;
      color: #e8e0ff;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: rgba(26,18,40,0.95);
      border-bottom: 1px solid #2a1848;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .logo { font-size: 15px; font-weight: 900; color: #c090ff; display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 32px; height: 32px; background: linear-gradient(135deg, #7040c0, #4020a0); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: #fff; }
    .username { font-size: 13px; font-weight: 700; color: #d0b8ff; }
    .btn-out { font-size: 12px; color: #5a4080; cursor: pointer; padding: 4px 8px; border-radius: 6px; border: 1px solid #2a1848; background: none; }
    .btn-out:hover { color: #c090ff; border-color: #5a3090; }

    /* ── Main ── */
    main { max-width: 960px; margin: 0 auto; padding: 32px 20px 60px; }

    /* ── Welcome ── */
    .welcome { margin-bottom: 32px; }
    .welcome h1 { font-size: 24px; font-weight: 900; color: #e8e0ff; margin-bottom: 6px; }
    .welcome p { font-size: 14px; color: #5a4080; }

    /* ── Stats ── */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 32px; }
    .stat-card {
      background: #1a1228;
      border: 1px solid #2a1848;
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-icon { font-size: 22px; margin-bottom: 4px; }
    .stat-value { font-size: 28px; font-weight: 900; color: #c090ff; }
    .stat-label { font-size: 12px; color: #5a4080; }

    /* ── Quick actions ── */
    .section-title { font-size: 13px; font-weight: 800; color: #7050a0; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 14px; }
    .actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 32px; }
    .action-card {
      background: #1a1228;
      border: 1px solid #2a1848;
      border-radius: 14px;
      padding: 22px 20px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
      text-decoration: none;
      display: block;
    }
    .action-card:hover { border-color: #7040c0; transform: translateY(-2px); }
    .action-card.primary { background: linear-gradient(135deg, #2a0860, #1a0440); border-color: #5030a0; }
    .action-icon { font-size: 28px; margin-bottom: 10px; }
    .action-title { font-size: 15px; font-weight: 800; color: #d0b8ff; margin-bottom: 4px; }
    .action-desc { font-size: 12px; color: #5a4080; line-height: 1.5; }

    /* ── History ── */
    .history-section { margin-bottom: 32px; }
    .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      background: #1a1228;
      border: 1px solid #2a1848;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .history-item:hover { border-color: #5030a0; }
    .history-icon { font-size: 22px; flex-shrink: 0; }
    .history-info { flex: 1; min-width: 0; }
    .history-title { font-size: 14px; font-weight: 700; color: #d0b8ff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-meta { font-size: 11px; color: #5a4080; margin-top: 3px; }
    .history-arrow { color: #3a2060; font-size: 16px; flex-shrink: 0; }
    .history-del { font-size: 12px; color: #5a3060; cursor: pointer; padding: 4px 8px; border-radius: 6px; flex-shrink: 0; }
    .history-del:hover { background: #2a1020; color: #c03030; }
    .history-title-input {
      font-size: 14px; font-weight: 700; color: #d0b8ff; background: #0d0a18;
      border: 1px solid #5030a0; border-radius: 4px; padding: 2px 6px;
      font-family: inherit; flex: 1; min-width: 0; outline: none;
    }
    .history-rename-btn {
      font-size: 11px; padding: 2px 6px; border-radius: 4px; border: none;
      cursor: pointer; font-family: inherit; flex-shrink: 0; line-height: 1.4;
    }
    .history-rename-btn.ok { background: #3020a0; color: #c0a8ff; }
    .history-rename-btn.ok:hover { background: #5040c0; }
    .history-rename-btn.cancel { background: none; color: #5a4080; }
    .history-rename-btn.cancel:hover { color: #c03030; }
    .empty-state { text-align: center; padding: 40px 20px; color: #3a2060; }
    .empty-state p { font-size: 13px; margin-top: 8px; }

    /* ── Profile modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .modal-box { background: #1a1228; border: 1px solid #2a1848; border-radius: 14px; width: 320px; max-width: 92vw; overflow: hidden; }
    .modal-header { display: flex; align-items: center; padding: 14px 16px 12px; border-bottom: 1px solid #2a1848; gap: 8px; min-height: 48px; }
    .modal-back { background: none; border: none; color: #9060d0; font-size: 13px; cursor: pointer; padding: 0; display: none; align-items: center; gap: 3px; }
    .modal-back::before { content: '‹'; font-size: 20px; line-height: 1; }
    .modal-title { font-size: 15px; font-weight: 800; color: #e0d0ff; flex: 1; }
    .modal-close { background: none; border: none; color: #5a4080; font-size: 18px; cursor: pointer; padding: 0 2px; line-height: 1; }
    /* Settings list */
    .settings-list { display: flex; flex-direction: column; }
    .settings-row { display: flex; align-items: center; padding: 13px 16px; cursor: pointer; border-bottom: 1px solid #1e1230; transition: background 0.15s; gap: 12px; }
    .settings-row:last-child { border-bottom: none; }
    .settings-row:hover { background: #211535; }
    .settings-row-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .settings-row-body { flex: 1; min-width: 0; }
    .settings-row-label { font-size: 13px; font-weight: 600; color: #d0b8ff; }
    .settings-row-sub { font-size: 11px; color: #5a4080; margin-top: 1px; }
    .settings-row-chevron { color: #3a2060; font-size: 16px; }
    /* Detail panel */
    .settings-detail { display: none; flex-direction: column; gap: 10px; padding: 16px; }
    .settings-detail.active { display: flex; }
    .modal-input { width: 100%; padding: 9px 12px; border: 1.5px solid #2a1848; border-radius: 8px; font-size: 13px; background: #0d0a1a; color: #e8e0ff; box-sizing: border-box; font-family: inherit; }
    .modal-input:focus { outline: none; border-color: #7040c0; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn { padding: 7px 14px; border-radius: 8px; border: 1px solid #2a1848; background: #1a1228; color: #d0b8ff; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; }
    .btn-primary { background: linear-gradient(135deg, #7040c0, #4020a0); color: #fff; border-color: #7040c0; }
    .btn-danger { background: #2a1020; border-color: #601020; color: #ff8080; }
    .msg { font-size: 12px; padding: 6px 10px; border-radius: 6px; }
    .msg.ok { background: #0a2a14; color: #40c060; }
    .msg.err { background: #2a0a0a; color: #ff6060; }
    /* Toggles */
    .fmt-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1e1230; }
    .fmt-row:last-of-type { border-bottom: none; }
    .fmt-label { font-size: 13px; color: #d0b8ff; }
    .fmt-label span { font-size: 11px; color: #5a4080; margin-left: 4px; }
    .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track { position: absolute; inset: 0; background: #2a1848; border-radius: 20px; cursor: pointer; transition: background 0.2s; }
    .toggle input:checked + .toggle-track { background: #7040c0; }
    .toggle-track::after { content: ''; position: absolute; left: 3px; top: 3px; width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .toggle input:checked + .toggle-track::after { transform: translateX(16px); }
    .fmt-preview { font-size: 12px; color: #9070d0; background: #120a20; border-radius: 6px; padding: 7px 10px; font-family: monospace; word-break: break-all; }

    /* ── Stats detail ── */
    .stats-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 32px; }
    .stat-detail-card { background: #1a1228; border: 1px solid #2a1848; border-radius: 12px; padding: 18px 20px; }
    .stat-detail-title { font-size: 12px; font-weight: 800; color: #7050a0; margin-bottom: 14px; letter-spacing: 0.5px; text-transform: uppercase; }
    .board-list { display: flex; flex-direction: column; gap: 6px; }
    .board-row { display: flex; align-items: center; gap: 8px; }
    .board-name { font-size: 12px; color: #a080d0; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .board-bar-track { width: 80px; background: #0d0a1a; border-radius: 4px; height: 6px; overflow: hidden; flex-shrink: 0; }
    .board-bar-fill { height: 100%; background: #5030a0; border-radius: 4px; transition: width 0.4s; }
    .board-count { font-size: 11px; color: #5a4080; width: 20px; text-align: right; flex-shrink: 0; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      main { padding: 20px 14px 40px; }
      .stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stats-detail { grid-template-columns: 1fr; }
      .stat-card { padding: 12px; }
      .stat-value { font-size: 22px; }
      .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🐺 狼人杀记录</div>
  <div class="header-right">
    <div class="avatar" id="avatarEl"></div>
    <div class="username" id="usernameEl"></div>
    <button class="btn-out" onclick="logout()">退出</button>
  </div>
</header>

<main>
  <div class="welcome">
    <h1 id="welcomeText">欢迎回来</h1>
    <p id="welcomeSub">准备好开始新的一局了吗？</p>
  </div>

  <!-- 统计 -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-icon">🎮</div>
      <div class="stat-value" id="totalGames">—</div>
      <div class="stat-label">总对局数</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📅</div>
      <div class="stat-value" id="thisMonth">—</div>
      <div class="stat-label">本月对局</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🏆</div>
      <div class="stat-value" id="lastActive">—</div>
      <div class="stat-label">最近活跃</div>
    </div>
  </div>

  <!-- 快捷操作 -->
  <div class="section-title">快捷操作</div>
  <div class="actions">
    <a href="game.html?new=1" class="action-card primary">
      <div class="action-icon">🎯</div>
      <div class="action-title">开始新对局</div>
      <div class="action-desc">进入记录页面，开始新一局狼人杀</div>
    </a>
    <div class="action-card" onclick="openProfileModal()">
      <div class="action-icon">👤</div>
      <div class="action-title">个人设置</div>
      <div class="action-desc">修改密码，管理账户信息</div>
    </div>
  </div>

  <!-- 详细统计 -->
  <div class="stats-detail" id="statsDetail" style="display:none">
    <div class="stat-detail-card">
      <div class="stat-detail-title">常用板子</div>
      <div class="board-list" id="boardList"></div>
    </div>
  </div>

  <!-- 历史记录 -->
  <div class="history-section">
    <div class="history-header">
      <div class="section-title" style="margin:0">历史对局</div>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-state">⏳ <p>加载中…</p></div>
    </div>
  </div>
</main>

<!-- 个人设置 Modal -->
<div id="profileModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeProfileModal()">
  <div class="modal-box">
    <div class="modal-header">
      <button class="modal-back" id="settingsBackBtn" onclick="settingsBack()">返回</button>
      <div class="modal-title" id="settingsTitle">个人设置</div>
      <button class="modal-close" onclick="closeProfileModal()">×</button>
    </div>

    <!-- 设置列表 -->
    <div class="settings-list" id="settingsList">
      <div class="settings-row" onclick="settingsNav('password')">
        <div class="settings-row-icon" style="background:#2a1848">🔑</div>
        <div class="settings-row-body">
          <div class="settings-row-label">修改密码</div>
        </div>
        <div class="settings-row-chevron">›</div>
      </div>
      <div class="settings-row" onclick="settingsNav('apikey')">
        <div class="settings-row-icon" style="background:#1a2840">🤖</div>
        <div class="settings-row-body">
          <div class="settings-row-label">OpenAI API Key</div>
          <div class="settings-row-sub" id="apiKeyStatus">未设置</div>
        </div>
        <div class="settings-row-chevron">›</div>
      </div>
      <div class="settings-row" onclick="settingsNav('naming')">
        <div class="settings-row-icon" style="background:#1a2818">✏️</div>
        <div class="settings-row-body">
          <div class="settings-row-label">默认对局名称</div>
          <div class="settings-row-sub" id="namingPreviewRow"></div>
        </div>
        <div class="settings-row-chevron">›</div>
      </div>
    </div>

    <!-- 修改密码 -->
    <div class="settings-detail" id="detail-password">
      <input class="modal-input" type="password" id="oldPwd" placeholder="当前密码">
      <input class="modal-input" type="password" id="newPwd" placeholder="新密码">
      <input class="modal-input" type="password" id="newPwd2" placeholder="确认新密码">
      <div id="profileMsg" style="display:none"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="changePassword()">保存</button>
      </div>
    </div>

    <!-- API Key -->
    <div class="settings-detail" id="detail-apikey">
      <div style="font-size:12px;color:#5a4080">用于录音转文字和 AI 发言分析，Key 仅存在本地浏览器。</div>
      <input class="modal-input" type="password" id="apiKeyInput" placeholder="sk-..." spellcheck="false">
      <div id="apikeyMsg" style="display:none"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveApiKey()">保存</button>
      </div>
    </div>

    <!-- 命名格式 -->
    <div class="settings-detail" id="detail-naming">
      <div style="font-size:12px;color:#5a4080">选择名称包含的内容，顺序固定为：日期→时间→板子→序号</div>
      <div class="fmt-row">
        <div class="fmt-label">日期 <span>3月30日</span></div>
        <label class="toggle"><input type="checkbox" id="fmt-date" onchange="updateFmtPreview()"><div class="toggle-track"></div></label>
      </div>
      <div class="fmt-row">
        <div class="fmt-label">时间 <span>14:30</span></div>
        <label class="toggle"><input type="checkbox" id="fmt-time" onchange="updateFmtPreview()"><div class="toggle-track"></div></label>
      </div>
      <div class="fmt-row">
        <div class="fmt-label">板子 <span>奇迹商人</span></div>
        <label class="toggle"><input type="checkbox" id="fmt-board" onchange="updateFmtPreview()"><div class="toggle-track"></div></label>
      </div>
      <div class="fmt-row">
        <div class="fmt-label">序号 <span>第N把</span></div>
        <label class="toggle"><input type="checkbox" id="fmt-num" onchange="updateFmtPreview()"><div class="toggle-track"></div></label>
      </div>
      <div class="fmt-preview" id="fmtPreview"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveFmt()">保存</button>
      </div>
    </div>

  </div>
</div>

<script>
const API = 'http://localhost:3001';
const token = localStorage.getItem('ww_token');
const username = localStorage.getItem('ww_user');

// 未登录跳转
if (!token) {
  window.location.href = '../index.html';
}

// 显示用户信息
document.getElementById('avatarEl').textContent = (username || '?')[0].toUpperCase();
document.getElementById('usernameEl').textContent = username;
document.getElementById('welcomeText').textContent = '欢迎回来，' + username + ' 👋';

function logout() {
  localStorage.removeItem('ww_token');
  localStorage.removeItem('ww_user');
  window.location.href = '../index.html';
}

// ── 加载历史记录 ──────────────────────────────────────────────────────────
async function loadHistory() {
  try {
    const res = await fetch(`${API}/api/games`, { headers: { 'Authorization': 'Bearer ' + token } });
    const games = await res.json();

    // 统计
    renderDetailStats(games);
    document.getElementById('totalGames').textContent = games.length;
    const now = new Date();
    const thisMonth = games.filter(g => {
      const d = new Date(g.created_at);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }).length;
    document.getElementById('thisMonth').textContent = thisMonth;
    if (games.length > 0) {
      const last = new Date(games[0].created_at);
      const diff = Math.floor((now - last) / 86400000);
      document.getElementById('lastActive').textContent = diff === 0 ? '今天' : diff + '天前';
    } else {
      document.getElementById('lastActive').textContent = '—';
    }

    // 列表
    const list = document.getElementById('historyList');
    if (!games.length) {
      list.innerHTML = '<div class="empty-state">🎮 <p>还没有对局记录，去开始第一局吧！</p></div>';
      return;
    }
    list.innerHTML = games.map(g => `
      <div class="history-item" onclick="loadGame(${g.id})">
        <div class="history-icon">🃏</div>
        <div class="history-info">
          <div class="history-title">${escHtml(g.title)}</div>
          <div class="history-meta">${g.board_type || '未知板子'} · ${new Date(g.created_at).toLocaleString('zh-CN')}${g.game_result ? ' · ' + {'good':'好人胜','wolf':'狼人胜','draw':'平局'}[g.game_result] : ''}</div>
        </div>
        <div class="history-arrow">›</div>
        <div class="history-del" onclick="event.stopPropagation();renameGame(${g.id},this)" style="color:#6050a0">改名</div>
        <div class="history-del" onclick="event.stopPropagation();printGame(${g.id})" style="color:#4070c0" title="保存PDF">PDF</div>
        <div class="history-del" onclick="event.stopPropagation();delGame(${g.id},this)">删除</div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('historyList').innerHTML = '<div class="empty-state">❌ <p>无法连接到服务器</p></div>';
  }
}

function renderDetailStats(games) {
  if (!games.length) return;
  document.getElementById('statsDetail').style.display = '';

  // 板子使用
  const boardCount = {};
  games.forEach(g => { if (g.board_type) boardCount[g.board_type] = (boardCount[g.board_type] || 0) + 1; });
  const sorted = Object.entries(boardCount).sort((a,b) => b[1]-a[1]).slice(0, 6);
  const maxB = sorted[0]?.[1] || 1;
  document.getElementById('boardList').innerHTML = sorted.length
    ? sorted.map(([key, cnt]) => `
        <div class="board-row">
          <div class="board-name">${BOARD_NAMES[key] || key}</div>
          <div class="board-bar-track"><div class="board-bar-fill" style="width:${cnt/maxB*100}%"></div></div>
          <div class="board-count">${cnt}</div>
        </div>`).join('')
    : '<div style="font-size:12px;color:#5a4080">暂无数据</div>';
}

const BOARD_NAMES = {
  miracle:'10人奇迹商人', yuezui_10:'10人月坠光渊', speed_10:'10人速推场',
  beauty_10:'10人狼美人骑士', mirror_10:'10人镜隐迷踪', dark_10:'10人暗夜星辰',
  miracle_12:'12人奇迹商人', standard_12:'12人标准场', yuezui_12:'12人月坠光渊',
  cupid_12:'12人丘比特场', beauty_12:'12人狼美人骑士', mirror_12:'12人镜隐迷踪',
  dark_12:'12人暗夜星辰', gargoyle_12:'12人石像鬼守墓人', crimson_12:'12人赤月猎魔人',
  cursefox_12:'12人咒狐乌鸦', lonely_12:'12人孤独少女', hunter_12:'12人猎日逐光',
  awaken_king_12:'12人觉醒狼王', awaken_lonely_12:'12人觉醒孤独少女',
  awaken_witch_12:'12人觉醒女巫', dream_king_12:'12人狼王摄梦人', king_guard_12:'12人狼王守卫',
  basic_6:'6人基础', basic_9:'9人基础',
};

function escHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function loadGame(id) {
  try {
    const res = await fetch(`${API}/api/games/${id}`, { headers: { 'Authorization': 'Bearer ' + token } });
    const game = await res.json();
    localStorage.setItem('ww_load_game', JSON.stringify(game.data));
    localStorage.setItem('ww_load_game_id', game.id);
    localStorage.setItem('ww_load_game_title', game.title);
    window.location.href = 'game.html';
  } catch { alert('载入失败'); }
}

async function printGame(id) {
  try {
    const res = await fetch(`${API}/api/games/${id}`, { headers: { 'Authorization': 'Bearer ' + token } });
    const game = await res.json();
    if (!res.ok) { alert(game.error || '载入失败，请重试'); return; }
    localStorage.setItem('ww_load_game', JSON.stringify(game.data));
    localStorage.setItem('ww_load_game_id', game.id);
    localStorage.setItem('ww_load_game_title', game.title);
    localStorage.setItem('ww_print_on_load', '1');
    window.location.href = 'game.html';
  } catch { alert('连接失败，请检查服务器是否启动'); }
}

function renameGame(id, btn) {
  const item = btn.closest('.history-item');
  const titleEl = item.querySelector('.history-title');
  const originalTitle = titleEl.textContent.trim();

  titleEl.style.cssText = 'overflow:visible;white-space:normal;display:flex;align-items:center;gap:4px;';

  const input = document.createElement('input');
  input.className = 'history-title-input';
  input.value = originalTitle;
  input.onclick = e => e.stopPropagation();
  input.onkeydown = e => {
    e.stopPropagation();
    if (e.key === 'Enter') doRename(id, input, titleEl, originalTitle);
    if (e.key === 'Escape') doRestoreTitle(titleEl, originalTitle);
  };

  const ok = document.createElement('button');
  ok.className = 'history-rename-btn ok';
  ok.textContent = '✓';
  ok.onclick = e => { e.stopPropagation(); doRename(id, input, titleEl, originalTitle); };

  const cancel = document.createElement('button');
  cancel.className = 'history-rename-btn cancel';
  cancel.textContent = '✕';
  cancel.onclick = e => { e.stopPropagation(); doRestoreTitle(titleEl, originalTitle); };

  titleEl.innerHTML = '';
  titleEl.appendChild(input);
  titleEl.appendChild(ok);
  titleEl.appendChild(cancel);
  input.focus();
  input.select();
}

async function doRename(id, input, titleEl, originalTitle) {
  const newTitle = input.value.trim();
  if (!newTitle) return;
  try {
    const res = await fetch(`${API}/api/games/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ title: newTitle })
    });
    if (!res.ok) throw new Error();
    doRestoreTitle(titleEl, newTitle);
  } catch {
    alert('改名失败');
    doRestoreTitle(titleEl, originalTitle);
  }
}

function doRestoreTitle(titleEl, title) {
  titleEl.style.cssText = '';
  titleEl.textContent = title;
}

async function delGame(id, el) {
  if (!confirm('删除这条记录？')) return;
  await fetch(`${API}/api/games/${id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
  el.closest('.history-item').remove();
  loadHistory();
}

// ── 个人设置 Modal ────────────────────────────────────────────────────────
const DEFAULT_FMT = { date: true, time: false, board: true, num: true };

function loadFmt() {
  try { return JSON.parse(localStorage.getItem('ww_name_format')) || DEFAULT_FMT; }
  catch { return DEFAULT_FMT; }
}

function openProfileModal() {
  settingsShowList();
  document.getElementById('profileModal').style.display = 'flex';
}

function settingsShowList() {
  // Update status hints on the list
  const key = localStorage.getItem('ww_whisper_key') || '';
  const status = document.getElementById('apiKeyStatus');
  status.textContent = key ? '✓ 已设置' : '未设置';
  status.style.color = key ? '#40c060' : '#5a4080';

  const fmt = loadFmt();
  const d = new Date();
  const preview = [];
  if (fmt.date)  preview.push(`${d.getMonth()+1}月${d.getDate()}日`);
  if (fmt.time)  preview.push(`${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`);
  if (fmt.board) preview.push('板子');
  if (fmt.num)   preview.push('第N把');
  document.getElementById('namingPreviewRow').textContent = preview.join(' ') || '未配置';

  // Show list, hide all details
  document.getElementById('settingsList').style.display = '';
  ['password','apikey','naming'].forEach(id => {
    document.getElementById('detail-' + id).classList.remove('active');
  });
  document.getElementById('settingsBackBtn').style.display = 'none';
  document.getElementById('settingsTitle').textContent = '个人设置';
  document.getElementById('profileMsg').style.display = 'none';
}

function settingsNav(page) {
  document.getElementById('settingsList').style.display = 'none';
  ['password','apikey','naming'].forEach(id => {
    document.getElementById('detail-' + id).classList.remove('active');
  });
  document.getElementById('detail-' + page).classList.add('active');
  document.getElementById('settingsBackBtn').style.display = 'flex';

  const titles = { password:'修改密码', apikey:'API Key', naming:'默认对局名称' };
  document.getElementById('settingsTitle').textContent = titles[page];

  if (page === 'apikey') {
    const key = localStorage.getItem('ww_whisper_key') || '';
    document.getElementById('apiKeyInput').value = key;
  }
  if (page === 'naming') {
    const fmt = loadFmt();
    document.getElementById('fmt-date').checked  = !!fmt.date;
    document.getElementById('fmt-time').checked  = !!fmt.time;
    document.getElementById('fmt-board').checked = !!fmt.board;
    document.getElementById('fmt-num').checked   = !!fmt.num;
    updateFmtPreview();
  }
}

function settingsBack() { settingsShowList(); }

function updateFmtPreview() {
  const d = new Date();
  const parts = [];
  if (document.getElementById('fmt-date').checked)  parts.push(`${d.getMonth()+1}月${d.getDate()}日`);
  if (document.getElementById('fmt-time').checked)  parts.push(`${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`);
  if (document.getElementById('fmt-board').checked) parts.push('奇迹商人');
  if (document.getElementById('fmt-num').checked)   parts.push('第1把');
  document.getElementById('fmtPreview').textContent = parts.length ? parts.join(' ') : '（空）';
}

function saveFmt() {
  const fmt = {
    date:  document.getElementById('fmt-date').checked,
    time:  document.getElementById('fmt-time').checked,
    board: document.getElementById('fmt-board').checked,
    num:   document.getElementById('fmt-num').checked,
  };
  localStorage.setItem('ww_name_format', JSON.stringify(fmt));
  setTimeout(settingsShowList, 200);
}

function closeProfileModal() { document.getElementById('profileModal').style.display = 'none'; }

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  localStorage.setItem('ww_whisper_key', key);
  showDetailMsg('apikeyMsg', key ? 'API Key 已保存' : 'API Key 已清除', 'ok');
  setTimeout(settingsShowList, 800);
}

async function changePassword() {
  const oldPwd = document.getElementById('oldPwd').value;
  const newPwd = document.getElementById('newPwd').value;
  const newPwd2 = document.getElementById('newPwd2').value;
  if (!oldPwd) { showDetailMsg('profileMsg', '请输入当前密码', 'err'); return; }
  if (newPwd !== newPwd2) { showDetailMsg('profileMsg', '两次输入的新密码不一致', 'err'); return; }
  if (newPwd.length < 6) { showDetailMsg('profileMsg', '新密码至少6位', 'err'); return; }
  try {
    const res = await fetch(`${API}/api/change-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ oldPassword: oldPwd, newPassword: newPwd })
    });
    const data = await res.json();
    if (!res.ok) { showDetailMsg('profileMsg', data.error, 'err'); return; }
    showDetailMsg('profileMsg', '密码修改成功', 'ok');
    document.getElementById('oldPwd').value = '';
    document.getElementById('newPwd').value = '';
    document.getElementById('newPwd2').value = '';
    setTimeout(settingsShowList, 1000);
  } catch { showDetailMsg('profileMsg', '连接失败', 'err'); }
}

function showDetailMsg(id, text, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

loadHistory();
